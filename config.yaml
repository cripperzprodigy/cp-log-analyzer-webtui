# Configuration for Log Searcher and AI Analyzer

# ==========================================
# AI Provider Settings
# ==========================================
# We use `litellm` under the hood, which supports almost any AI provider.
# Below are examples for various providers. Uncomment the ONE you want to use.

ai:
  # ----------------------------------------
  # By default, NO AI is configured.
  # You MUST uncomment and configure ONE of the providers below.
  # ----------------------------------------
  model: ""
  api_base: ""
  api_key: ""
  
  # ----------------------------------------
  # 1. Local: Ollama
  # ----------------------------------------
  # model: "ollama/llama3"
  # api_base: "http://localhost:11434"
  # api_key: "" # Not required for Ollama
  
  # ----------------------------------------
  # 2. Local: LM-Studio / LocalAI / vLLM
  # ----------------------------------------
  # model: "openai/<model_name>" # Litellm routes this via the OpenAI spec. Replace <model_name> with your loaded model.
  # api_base: "http://localhost:1234/v1" # Standard port for LM-Studio. For vLLM, it's typically http://localhost:8000/v1
  # api_key: "sk-local" # Any string works for most local proxy servers.
  
  # ----------------------------------------
  # 3. Cloud: OpenRouter
  # ----------------------------------------
  # model: "openrouter/anthropic/claude-3.5-sonnet" # Must have 'openrouter/' prefix.
  # api_base: "" # Leave empty, litellm defaults to https://openrouter.ai/api/v1
  # api_key: "sk-or-v1-..." # Put your OpenRouter key here.
  
  # ----------------------------------------
  # 4. Cloud: OpenAI
  # ----------------------------------------
  # model: "gpt-4o" # No prefix needed. To force chat completion, could also be 'openai/gpt-4o'
  # api_base: "" # Leave empty for standard OpenAI API.
  # api_key: "sk-proj-..." # Put your OpenAI key here.
  
  # ----------------------------------------
  # 5. Cloud: Anthropic
  # ----------------------------------------
  # model: "claude-3-5-sonnet-20241022" # No prefix needed. Litellm routes to Anthropic.
  # api_base: "" # Leave empty.
  # api_key: "sk-ant-..." # Put your Anthropic key here.

  # ----------------------------------------
  # 6. Legacy / Text Completions (Non-Chat)
  # ----------------------------------------
  # If you are using an older model that does not support the Chat Completion API 
  # (i.e., it doesn't take 'messages' with 'roles', but instead a raw prompt string),
  # use the `text-completion-openai/` prefix:
  # model: "text-completion-openai/<model_name>"
  # api_base: "http://localhost:1234/v1"

  # --- Generation parameters ---
  temperature: 0.2
  max_tokens: 4096


# ==========================================
# Log Search Settings
# ==========================================
search:
  # Default chunk size for reading large files (in bytes)
  # 1048576 = 1MB. Adjust this based on your RAM capabilities.
  chunk_size_bytes: 1048576


# ==========================================
# Security Settings
# ==========================================
security:
  # Whether to mask Personally Identifiable Information (PII) like emails, phones, 
  # and credit cards from logs before they are displayed or sent to external AI providers.
  # Default is false, assuming the tool is run by sysadmins who need full visibility.
  pii_masking_enabled: false


# ==========================================
# Web UI Settings
# ==========================================
web:
  # The host to bind to. Use "127.0.0.1" for local-only, or "0.0.0.0" to expose on your network.
  host: "127.0.0.1"
  # The port the Web UI will run on.
  port: 8000


# ==========================================
# Terminal UI Settings
# ==========================================
tui:
  # TUI Theme setting
  theme: "textual-dark"
