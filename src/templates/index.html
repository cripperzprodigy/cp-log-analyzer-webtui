<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Searcher & AI Analyzer</title>
    <!-- Include marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f111a;
            --panel-bg: #1e2130;
            --text-color: #e2e8f0;
            --border-color: #2c314a;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --user-msg: #3b82f6;
            --ai-msg: #2a2e42;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 15px;
        }

        /* --- Sidebar Styles --- */
        #sidebar {
            width: 280px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .sidebar-header {
            padding: 15px 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            background: #191b28;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .refresh-btn:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        #directory-tree {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
            font-size: 14px;
        }
        
        .dir-path-header {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 15px;
            padding-left: 10px;
            word-break: break-all;
        }

        .dir-item {
            cursor: pointer;
            padding: 8px 10px;
            margin-bottom: 2px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .dir-item:hover {
            background-color: #2c314a;
        }
        
        .icon {
            margin-right: 10px;
            font-size: 16px;
            display: inline-block;
            width: 20px;
            text-align: center;
        }

        /* --- Main Area Styles --- */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            position: relative;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: 500;
            color: #94a3b8;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab:hover {
            color: var(--text-color);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            color: var(--accent-color);
            background-color: var(--bg-color);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-color);
        }

        /* Content Panes */
        .pane {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 25px;
            overflow: hidden;
        }

        .pane.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- AI Chat Pane --- */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Chat bubbles */
        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .message.user {
            background-color: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            background-color: var(--ai-msg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        /* Markdown Styles inside AI bubble */
        .message.ai p { margin-top: 0; margin-bottom: 10px; }
        .message.ai p:last-child { margin-bottom: 0; }
        .message.ai code {
            background-color: #1a1d2d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .message.ai pre {
            background-color: #11131d;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }
        .message.ai pre code {
            background-color: transparent;
            padding: 0;
            color: #a6accd;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 15px 20px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .chat-input-container {
            display: flex;
            gap: 15px;
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            align-items: center;
        }

        /* --- Core Search Pane --- */
        .search-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        #search-results {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 20px;
            background-color: #11131d;
            border-radius: 12px;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .search-line {
            padding: 4px 8px;
            border-bottom: 1px solid #1e2130;
            display: flex;
        }
        
        .search-line:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .line-num {
            color: #64748b;
            margin-right: 15px;
            user-select: none;
            min-width: 50px;
            text-align: right;
        }

        .line-content {
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .search-error { color: var(--error-color); }
        .search-info { color: #f59e0b; }

        /* --- Global Inputs & Buttons --- */
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background-color: #11131d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #334155;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <span>Explorer</span>
            <button class="refresh-btn" onclick="loadDirectory(currentDirPath)" title="Refresh Directory">↻</button>
        </div>
        <div id="directory-tree">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Main Area -->
    <div id="main-area">
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chat')">AI Investigation</div>
            <div class="tab" onclick="switchTab('search')">Core Search</div>
        </div>

        <!-- AI Chat Pane -->
        <div id="pane-chat" class="pane active">
            <div id="chat-history">
                <div class="message-row ai">
                    <div class="message ai">👋 AI Investigator initialized. I have access to your local files and can search logs. How can I help you today?</div>
                </div>
            </div>
            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="E.g., What caused the error in ./logs/app.log?" onkeypress="handleChatKeyPress(event)" autocomplete="off">
                <button id="chat-send-btn" onclick="sendChatMessage()">Send</button>
            </div>
        </div>

        <!-- Core Search Pane -->
        <div id="pane-search" class="pane">
            <div class="search-controls">
                <input type="text" id="search-filepath" placeholder="Filepath (e.g. ./logs/app.log)" style="flex: 2;">
                <input type="text" id="search-keyword" placeholder="Keyword (optional)">
                <input type="text" id="search-regex" placeholder="Regex (optional)">
                <button id="search-btn" onclick="runSearch()">Search Logs</button>
            </div>
            <div id="search-results">
                <div style="color: #64748b; text-align: center; margin-top: 40px;">
                    Enter a filepath and search criteria above to begin.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set marked.js options
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        let currentDirPath = "./";

        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`pane-${tabId}`).classList.add('active');
            
            if(tabId === 'chat') {
                document.getElementById('chat-input').focus();
            }
        }

        // Directory Tree
        async function loadDirectory(path = "./") {
            const tree = document.getElementById('directory-tree');
            tree.innerHTML = '<div style="text-align: center; padding: 20px; color: #64748b;">Loading...</div>';
            
            try {
                const response = await fetch(`/api/directory?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                
                if (data.error) {
                    tree.innerHTML = `<div style="color: var(--error-color); padding: 10px;">Error: ${data.error}</div>`;
                    return;
                }

                currentDirPath = data.current_path;
                let html = `<div class="dir-path-header">${data.current_path}</div>`;
                
                if (path !== "./" && path !== "." && path !== "/") {
                    // Primitive 'up one level'
                    let parentPath = path.substring(0, path.lastIndexOf('/')) || "./";
                    if(path.endsWith('/')) {
                       let cleanPath = path.substring(0, path.length-1);
                       parentPath = cleanPath.substring(0, cleanPath.lastIndexOf('/')) || "./";
                    }
                    html += `<div class="dir-item" onclick="loadDirectory('${parentPath}')"><span class="icon">⤴️</span>..</div>`;
                }

                data.items.forEach(item => {
                    const icon = item.is_dir ? "📁" : "📄";
                    const clickAction = item.is_dir 
                        ? `onclick="loadDirectory('${item.path.replace(/\\/g, '/')}')"` 
                        : `onclick="selectFileForSearch('${item.path.replace(/\\/g, '/')}')"`;
                    
                    html += `<div class="dir-item" ${clickAction} title="${item.path}">
                                <span class="icon">${icon}</span>${item.name}
                             </div>`;
                });
                
                tree.innerHTML = html;
            } catch (e) {
                tree.innerHTML = `<div style="color: var(--error-color); padding: 10px;">Error: ${e.message}</div>`;
            }
        }

        function selectFileForSearch(filepath) {
            document.getElementById('search-filepath').value = filepath;
            
            // Provide visual feedback
            const btn = document.getElementById('search-btn');
            const originalText = btn.innerText;
            const originalColor = btn.style.backgroundColor;
            
            btn.innerText = "File Selected!";
            btn.style.backgroundColor = "var(--success-color)";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "";
            }, 1000);
        }

        // AI Chat
        function handleChatKeyPress(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        }

        function createTypingIndicator(id) {
            return `
            <div id="${id}" class="message-row ai">
                <div class="message ai typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>`;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('chat-send-btn');
            const history = document.getElementById('chat-history');
            const message = input.value.trim();
            
            if (!message) return;

            // Add user message
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            
            history.innerHTML += `
                <div class="message-row user">
                    <div class="message user">${escapeHtml(message)}</div>
                </div>`;
            
            const loadingId = "loading-" + Date.now();
            history.innerHTML += createTypingIndicator(loadingId);
            history.scrollTop = history.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                if (data.error) {
                    history.innerHTML += `
                    <div class="message-row ai">
                        <div class="message ai" style="border-color: var(--error-color);"><b>Error:</b> ${data.error}</div>
                    </div>`;
                } else {
                    // Render markdown for AI response
                    const htmlResponse = marked.parse(data.response);
                    history.innerHTML += `
                    <div class="message-row ai">
                        <div class="message ai">${htmlResponse}</div>
                    </div>`;
                }
            } catch (e) {
                document.getElementById(loadingId).remove();
                history.innerHTML += `
                <div class="message-row ai">
                    <div class="message ai" style="border-color: var(--error-color);"><b>Error:</b> ${e.message}</div>
                </div>`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
                history.scrollTop = history.scrollHeight;
            }
        }

        // Core Search
        async function runSearch() {
            const filepath = document.getElementById('search-filepath').value.trim();
            const keyword = document.getElementById('search-keyword').value.trim();
            const regex = document.getElementById('search-regex').value.trim();
            const resultsDiv = document.getElementById('search-results');
            const btn = document.getElementById('search-btn');

            if (!filepath) {
                resultsDiv.innerHTML = '<div style="color: var(--error-color); padding: 10px;">Please provide a filepath.</div>';
                return;
            }

            resultsDiv.innerHTML = '<div style="color: #64748b; padding: 10px;">Searching...</div>';
            btn.disabled = true;

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filepath, keyword, regex })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="search-error" style="padding: 10px;">Error: ${data.error}</div>`;
                } else if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = '<div style="color: #64748b; padding: 10px;">No matches found.</div>';
                } else {
                    let html = '';
                    data.results.forEach(r => {
                        if (r.error) {
                            html += `<div class="search-line search-error">${r.error}</div>`;
                        } else if (r.info) {
                            html += `<div class="search-line search-info">${r.info}</div>`;
                        } else {
                            html += `
                            <div class="search-line">
                                <span class="line-num">${r.line_num}</span>
                                <span class="line-content">${escapeHtml(r.content)}</span>
                            </div>`;
                        }
                    });
                    resultsDiv.innerHTML = html;
                }
            } catch (e) {
                resultsDiv.innerHTML = `<div class="search-error" style="padding: 10px;">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Initialize
        loadDirectory();
        
        // Focus chat on load
        document.getElementById('chat-input').focus();
    </script>
</body>
</html>
